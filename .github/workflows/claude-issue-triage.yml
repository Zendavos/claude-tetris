name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are triaging GitHub issue #${{ github.event.issue.number }} in this repository.

            Read the issue title and body (use `gh issue view ${{ github.event.issue.number }}` if you need the
            full content), then do the following:

            1. Inspect the repository code (game.js, index.html, style.css) as needed to understand whether the
               issue is a bug, a feature request, a question, or something else, and which part of the game it
               touches (rendering, input, scoring, collision, rotation/wall kicks, leveling/speed, etc.).
            2. Apply appropriate labels to the issue using `gh issue edit ${{ github.event.issue.number }} --add-label "..."`.
               Check existing labels first with `gh label list`, and reuse them where they fit. Only create a new
               label with `gh label create` if nothing existing fits and it is clearly reusable (e.g. `bug`,
               `enhancement`, `question`, `documentation`, or an area label like `area: rendering`,
               `area: input`, `area: scoring`).
            3. Post a single comment on the issue (via `gh issue comment ${{ github.event.issue.number }} --body "..."`)
               containing a concise general diagnosis to help a developer implement the fix later. Include:
               - A one-line summary of the problem/request.
               - Likely root cause or relevant area of game.js (function/section names and rough line numbers
                 if you found them), based on the architecture described in CLAUDE.md.
               - Any edge cases or related behavior to keep in mind.
               - Do NOT write or propose an actual code fix/diff — this is diagnosis only, not implementation.

            Keep the comment concise and technical. If the issue is a duplicate, low-effort, or not actionable
            (e.g. spam, unclear), still label it appropriately (e.g. `question`, `invalid`) and leave a short
            comment explaining what's missing instead of a full diagnosis.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*)"'
